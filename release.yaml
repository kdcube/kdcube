platform:
  repo: "kdcube-ai-app"
  ref: "2026.7.10.1445"
  description: |
    This release follows 2026.7.5.530 and rebuilds connected-account consent
    around a demand-driven model while making agent capabilities a first-class,
    user-comprehensible surface.

    Consent: the attempt is the ask. Turn-start no longer sweeps configured
    tools or demands claim unions; a tool or named-service attempt with unmet
    claims returns the structured consent contract (scoped to exactly that
    tool's claims, with an absolute Connection Hub deep link and agent-facing
    instructions — one contract across chat and MCP), raises one deduplicated
    banner with two honest exits (approve the claims, or turn off the tools
    that need them), and the approval itself becomes a conversation-lane event
    that folds into the live turn so the agent circles back without a nudge.
    Claim tiers give per-provider consent granularity (Slack read/write/files,
    Gmail read/send); the consent plan lets users untick individual claims;
    credentials read through the process secret cache so approvals are visible
    immediately.

    Capabilities: one picker body serves three shells — the composer popover,
    an expanded in-chat modal, and a served capabilities widget mounted on
    scenes — showing per-agent capability groups in the grant vocabulary
    (Read / Create & update / Actions), per-operation and per-named-action
    narrowing enforced at dispatch, admin-excluded operations rendered as
    information, and intentional exclusions that declare their alternative
    path to the agent. Named-service realms carry a presentation layer
    (purpose, works-with, object kinds, human labels, claim labels) so one
    self-description serves two readers: the agent works the schema, the user
    reads the service card. The Connection Hub gains an admin Access map of
    resources, namespaces, and grants, plus tab-strip and frame-height fixes
    for embedded hosts.

    Files travel by ref. The mail and slack schemas speak per surface — the
    in-chat contract teaches ref-based attachments and never offers inline
    base64; react.pull teaches the share/onward-ref decision rule and reports
    its user delivery; encoded-blob scrubbing at the tool-block and render
    paths keeps base64 out of model context; reads ride react.pull everywhere
    (get_object left the ReAct roster) with the full consent contract on the
    pull path.

    ReAct hardening: external-event folding is total (a consumed no-block
    event advances the handler cursor — the completion livelock is fixed and
    pinned), deferred completions render their outcome, equivalent completes
    force-accept, answers collapse duplicates, and turn-start bookkeeping runs
    under fail-open budgets with sync I/O off the serving event loop.
config:
  version: "2026.7.10.1445"
