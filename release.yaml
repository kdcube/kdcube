platform:
  repo: "kdcube-ai-app"
  ref: "2026.6.19.202"
  description: |
    This release follows 2026.6.18.2120 with targeted authentication,
    cross-origin scene interaction, and documentation improvements needed for
    mixed-runtime deployments.

    The main product outcome is that a runtime can now trust more than one
    explicitly configured Cognito issuer/client pair while still validating
    tokens with the normal Cognito verifier. This supports transitional scenes
    where the browser signs in through one trusted runtime and calls apps
    hosted by another trusted runtime.

    Highlights

    - Adds server-side Multi-Cognito authentication mode. A runtime can accept
      JWTs from every configured trusted Cognito provider in `auth.providers`.
    - Keeps validation strict: provider routing uses untrusted JWT claims only
      to select the verifier, then the selected Cognito verifier validates
      issuer, client/audience, token use, signature, and expiration.
    - Requires access token and ID token, when both are present, to resolve to
      the same provider and subject.
    - Extends authentication settings with `CognitoTrustedProviderConfig` and
      `AUTH.COGNITO_TRUSTED_PROVIDERS`.
    - Supports `auth.idp: multi-cognito` / `cognito-multi` plus JSON provider
      lists through `AUTH_COGNITO_PROVIDERS_JSON` or
      `COGNITO_TRUSTED_PROVIDERS_JSON`.
    - Preserves existing single-Cognito behavior when only one provider is
      configured.
    - Adds regression tests for provider selection, mixed-token rejection, and
      delegation to the existing Cognito verifier.
    - Improves cross-origin context drag calibration by sending drag-start
      coordinates from chat file and ingress drags.
    - Increases the chat namespace-style fetch timeout so cold cross-origin CDN
      cache misses can still load namespace colors.
    - Clarifies event-lane documentation around external event movement into
      ReAct turns.

    Multi-Cognito auth

    - The browser still logs into one configured OIDC authority for a profile.
      Multi-Cognito is a server-side trust-list mode.
    - Provider selection is based on `iss` plus `client_id` for access tokens
      and `iss` plus `aud` for ID tokens.
    - The selected provider constructs a normal `CognitoAuthManager`, so
      cryptographic validation and Cognito claim checks remain centralized.
    - `CognitoUser` now carries provider metadata (`identity_provider` and
      `issuer`) for diagnostics and downstream policy decisions.

    Scene and chat interop

    - Chat-side file/context drags now include the coordinates needed by the
      scene host to calibrate cross-origin drops reliably.
    - Namespace presentation config fetches now allow longer cold starts so
      namespace-specific color styles are available in embedded chat widgets.

    Documentation

    - Adds Multi-Cognito descriptor examples to auth and descriptor docs.
    - Documents how trusted providers are configured and how future provider
      hints may be used for routing/logging while token claims remain
      authoritative.

    Runtime and deployment notes

    - Deployments should point the platform ref at 2026.6.19.202 to receive
      Multi-Cognito auth, cross-origin drag calibration, namespace-style fetch
      timeout improvements, and the updated docs.
    - Environments that should accept exactly one Cognito pool should keep
      `auth.idp: cognito`.
    - Mixed-runtime environments can use `auth.idp: multi-cognito` with an
      explicit `auth.providers` list. Each provider entry must include alias,
      region, user pool id, and app client id.

    Changelog

    - Added `MultiCognitoAuthManager`.
    - Added trusted Cognito provider config parsing.
    - Wired ingress auth manager selection for `multi-cognito`.
    - Added provider metadata to Cognito users.
    - Added Multi-Cognito tests.
    - Documented Multi-Cognito auth and descriptor shape.
    - Improved chat cross-origin drag coordinate reporting.
    - Increased namespace style fetch timeout for embedded chat.
    - Clarified event-lane to ReAct turn docs.
config:
    version: "2026.6.19.202"
