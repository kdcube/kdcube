platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.18.0319"
  description: |
    This release refreshes the built-in bundle UI surfaces and extends the
    Versatile main view so it behaves more like the full platform chat client
    while keeping the example surface small and embeddable.

    Highlights

    - Restyles the shared memory widget, Copilot widget, Versatile widget, and
      Versatile main view toward a lighter line-based interface with restrained
      panels, thinner controls, and clearer text hierarchy.
    - Adds active-turn continuation support to the Versatile main view. Users
      can now send follow-ups while a turn is running, and a Stop control sends
      the same steer/continuation contract used by the main chat client.
    - Adds inline live activity rendering in the Versatile main view for
      thinking, timeline updates, web search, web fetch, execution output,
      generated files, links, and service errors.
    - Adds Links and Files tabs to the Versatile turn view while keeping the
      existing Steps tab.
    - Makes streaming panels bounded so generated code, HTML, JSON, and long
      timeline content can be inspected without forcing the page to scroll.
    - Changes auto-scroll behavior so streaming keeps the bottom visible only
      when the user is already near the bottom.
    - Uses the configured continuation metadata fields for follow-up and steer
      requests: `message_kind`, `continuation_kind`, `active_turn_id`,
      `target_turn_id`, `followup`, and `steer`.
    - Keeps the main UI workspace light and compact, with a persistent left
      chat workspace area and restrained steel-blue action controls.

    Runtime and deployment notes:

    - This is an OSS UI/runtime release. It does not require descriptor changes
      by itself, but deployments must point at this platform ref to receive the
      updated built-in surfaces.
    - The Versatile main view now sends active-turn continuation requests to the
      existing `/sse/chat` endpoint; no new backend endpoint is introduced.
    - No private deployment or organization-specific content is part of this
      release.

    Validation and regression coverage:

    - Shared memory widget TypeScript check and production build passed.
    - Copilot widget typecheck and production build passed.
    - Versatile widget TypeScript check and production build passed.
    - Versatile main view TypeScript check and production build passed.

    Changelog

    - Updated built-in memory, Copilot, and Versatile widget styling.
    - Reworked the Versatile main view layout into a compact workspace.
    - Added follow-up and Stop support for active Versatile turns.
    - Added live subsystem activity banners and bounded scroll regions.
    - Added links/files turn tabs and continuation-aware user message display.
config:
    version: "2026.5.18.0319"
