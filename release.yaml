platform:
  repo: "kdcube-ai-app"
  ref: "2026.7.3.2030"
  description: |
    This release follows 2026.7.3.243 and adds the first platform slice of
    public, crawlable application content.

    The core addition is the SDK public-content backbone. Applications can now
    expose selected published content through a registry-backed public surface
    with stable item routes, canonical metadata, sitemap support, structured
    page rendering, and retract semantics. The platform owns the public serving
    path while the application owns the publish/update/retract lifecycle.

    The release also tightens the documentation around the new content surface.
    The public-content docs are now split between platform solution docs,
    application-surface docs, and recipes so application builders can understand
    where to declare content, where it is indexed, and how it is made
    discoverable without running application code on the crawler-facing path.

    Finally, the generated public article renderer no longer duplicates a
    headline over authored bodies that already carry their own article heading.
    This keeps public pages cleaner while preserving metadata and structured
    content for search engines, AI crawlers, and direct readers.

    Highlights

    - Adds the SDK public-content registry and serving backbone.
    - Supports public item pages, sitemap entries, canonical metadata, and
      retract/gone behavior for application-published content.
    - Separates public-content documentation into solution, application-surface,
      and recipe layers.
    - Documents the platform/application split for public content: applications
      publish the content record; the platform serves the public artifact.
    - Avoids duplicate rendered headlines when the authored public body already
      includes its own heading.

    Operational impact

    - Applications that opt into public content should define explicit aliases,
      metadata, canonical bases, and publish/retract behavior.
    - Deployment owners should verify any public-content route is intentionally
      exposed and backed by the expected application registry records.
    - Crawlers and direct readers can consume public content without loading the
      application's iframe/widget runtime.

    Changelog

    - Added the public-content SDK backbone.
    - Added and reorganized public-content documentation and recipes.
    - Updated public article body rendering to avoid duplicate title injection.
