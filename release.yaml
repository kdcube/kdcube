platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.26.410"
  description: |
    This platform release adds the public anonymous bundle UI access path for
    embedded versatile UI surfaces, with a host-driven login handoff contract.

    Highlights

    - Allows the versatile bundle UI to expose selected public anonymous
      surfaces without requiring a platform-authenticated session first.
    - Adds a host login handoff path so an embedded host can receive the login
      request and drive its own sign-in flow.
    - Keeps the embedded UI contract compatible with the host-driven frame
      controls introduced in the previous release.

    Runtime and deployment notes:

    - Deployments must point the platform ref at 2026.5.26.410 to receive this
      update.
    - Public anonymous access remains bundle-controlled; deployments still
      decide which bundle surfaces are exposed through descriptor/runtime
      configuration.
    - Host login handoff is for embedded UI integration. It does not replace the
      platform authentication and authorization checks for protected surfaces.
    - No private deployment content is part of this OSS release.

    Validation and regression coverage:

    - Release metadata diff check passed.
    - Staged OSS private-name scan must pass before the release commit.

    Changelog

    - Added public anonymous access support for selected versatile bundle UI
      flows.
    - Added host login handoff behavior for embedded UI usage.
config:
    version: "2026.5.26.410"
