platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.28.210"
  description: |
    This platform release improves versatile chat navigation and live UI
    behavior, hardens artifact materialization, and tightens isolated execution
    workspace limits.

    Highlights

    - Updates the versatile chat UI with live conversation title updates,
      viewport-locked expanded layout, turn pagination, and clearer turn
      cost/time status.
    - Adds turn navigation controls for moving to first, previous, next, and
      latest turns, while keeping compact widgets focused on latest-turn access.
    - Fixes React artifact hosting and pull materialization, including nested
      artifact resource resolution.
    - Strengthens isolated runtime workspace limit handling for generated files
      and monitored writable workspace deltas.

    Runtime and deployment notes:

    - Deployments must point the platform ref at 2026.5.28.210 to receive this
      update.
    - Operators using isolated Python execution should review the current
      `platform.services.proc.exec` workspace limit settings in `assembly.yaml`.
    - No private deployment content is part of this OSS release.

    Validation and regression coverage:

    - Release metadata parse check passed.
    - Staged OSS private-name scan must pass before the release commit.

    Changelog

    - Fixed live application of conversation title stream events.
    - Fixed expanded chat layout and turn pagination behavior.
    - Fixed React artifact hosting, pull materialization, and nested resource
      resolution.
    - Improved turn navigation and compact widget behavior.
    - Hardened isolated runtime workspace quota enforcement.
config:
    version: "2026.5.28.210"
