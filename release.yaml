platform:
  repo: "kdcube-ai-app"
  ref: "2026.7.1.455"
  description: |
    This release follows 2026.7.01.155 with a focused operational hotfix for
    git-managed bundle refresh.

    The previous release introduced built-in Connection Hub, managed MCP
    surfaces, and new applications-bundle refs. During staging rollout we found
    that a processor could keep serving an old managed-bundle path when the
    descriptor ref changed but the old path still existed on shared storage.
    That left runtime bundle admin and request-time resolution pointed at stale
    applications content even after the descriptor authority had the new ref.

    This release tightens the managed-bundle resolution path. Git-backed
    bundles now skip materialization only when the managed cache marker proves
    that the cached path matches the requested repo, ref, and subdir. A stale
    existing path is no longer enough to bypass git resolution.

    Startup descriptor reset synchronization was also hardened. Workers that do
    not acquire the descriptor-reset lock now wait for the writer and reload
    from descriptor authority, instead of silently continuing with stale local
    registry state. If the wait expires, the worker refreshes directly and
    publishes a replacement registry.

    Highlights

    - Validates git-managed bundle cache markers before reusing cached bundle
      paths.
    - Re-materializes git bundles when descriptor repo/ref/subdir no longer
      matches the local cache marker.
    - Releases the startup descriptor-reset lock with a per-worker token.
    - Makes non-writer startup workers wait for descriptor reset completion and
      reload from authority before serving bundle registry state.
    - Adds regression tests for stale-path re-materialization, current-cache
      reuse, descriptor-reset lock release, and busy-lock reload behavior.

    Operational impact

    - Environments using git-managed application bundles should now converge
      to the descriptor ref on processor startup and bundle reload.
    - Existing correct managed-bundle caches still skip git resolution through
      the marker check.
    - Stale caches are corrected visibly through logs and materialization,
      rather than silently serving old bundle code.

    Changelog

    - Updated git-managed bundle resolution in the bundle registry to validate
      cache marker state before accepting an existing path.
    - Updated startup bundle descriptor reset locking so only the lock holder
      writes under its token and followers reload fresh registry state.
    - Added targeted tests around stale bundle cache detection and startup
      descriptor reset coordination.
config:
  version: "2026.7.1.455"
