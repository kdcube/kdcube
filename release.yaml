platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.29.1534"
  description: |
    This platform release improves local descriptor export/import workflows,
    fixes seed descriptor materialization, and includes several chat/runtime
    hardening updates.

    Highlights

    - Adds and aligns `kdcube config export` / `kdcube config import` for
      local seed descriptor workflows.
    - Exports local descriptors in seed-compatible form: local storage defaults
      remain portable, local service hosts are normalized, platform-managed
      bundles are not exported with materialized managed paths, and unmanaged
      local bundle paths are preserved.
    - Fixes descriptor-mode platform secret resolution.
    - Accepts attachment-only chat and follow-up messages for processing.
    - Hardens delegated auth cookie forwarding.
    - Splits recorded telemetry event types from telemetry-shippable payloads.
    - Updates isolated workspace mental-map documentation to match the current
      implementation.

    Runtime and deployment notes:

    - Deployments must point the platform ref at 2026.5.29.1534 to receive this
      update.
    - Exported local descriptors may be reviewed and re-used as seed
      descriptors; `null` local storage values mean "use the runtime default"
      during init/import.
    - No private deployment content is part of this OSS release.

    Validation and regression coverage:

    - CLI descriptor tests passed.
    - Staged OSS private-name scan must pass before the release commit.

    Changelog

    - Fixed config export/import seed descriptor behavior.
    - Fixed local descriptor default materialization.
    - Fixed platform-managed bundle export shape.
    - Fixed descriptor-mode platform secret resolution.
    - Fixed attachment-only message promotion.
    - Hardened delegated auth cookie forwarding.
    - Split recorded and shippable telemetry event schemas.
config:
    version: "2026.5.29.1534"
