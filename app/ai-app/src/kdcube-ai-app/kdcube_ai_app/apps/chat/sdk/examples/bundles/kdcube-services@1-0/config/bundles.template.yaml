bundles:
  version: "1"
  default_bundle_id: "kdcube-services@1-0"
  items:
    - id: "kdcube-services@1-0"
      name: "KDCube Services"
      path: "<LOCAL_HOST_BUNDLE_ROOT>"
      module: "entrypoint"
      singleton: false
      config:
        surfaces:
          as_provider:
            bundle:
              visibility:
                allowed_roles: []
            mcp:
              conversations:
                auth:
                  mode: "managed"
                  authority_id: "delegated_client"
                  selected_tool_grants: true
              named_services:
                auth:
                  mode: "managed"
                  authority_id: "delegated_client"
                  selected_tool_grants: true
        ui:
          widgets:
            bundle_storage:
              enabled: true
              src_folder: "sdk://solutions/storage/ui.widget.storage"
              build_command: "npm install --no-package-lock && OUTDIR=<VI_BUILD_DEST_ABSOLUTE_PATH> npm run build"
